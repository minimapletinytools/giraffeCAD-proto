name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Cache venv
      uses: actions/cache@v4
      id: cache-venv
      with:
        path: venv
        key: venv-${{ runner.os }}-py3.14-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          venv-${{ runner.os }}-py3.14-

    - name: Create virtual environment & install dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run pytest
      run: |
        source venv/bin/activate
        python3 -m pytest
