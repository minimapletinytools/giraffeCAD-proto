name: Build And Publish Kumiki

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      bump_version_and_create_tag:
        description: Bump the kumiki minor version, commit, and create a release tag before publishing
        required: true
        default: false
        type: boolean
      existing_tag:
        description: Use an existing tag for publishing (overrides bump_version_and_create_tag)
        required: false
        type: string
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.package_info.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Bump version, commit, and tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_version_and_create_tag == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=$(python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          pyproject_path = Path('pyproject.toml')
          pyproject_text = pyproject_path.read_text(encoding='utf-8')
          current = tomllib.loads(pyproject_text)['project']['version']
          major, minor, patch = map(int, current.split('.'))
          new_version = f"{major}.{minor}.{patch + 1}"
          pyproject_text = re.sub(r'(?m)^version = "[^"]+"$', f'version = "{new_version}"', pyproject_text, count=1)
          pyproject_path.write_text(pyproject_text, encoding='utf-8')

          init_path = Path('kumiki/__init__.py')
          init_text = init_path.read_text(encoding='utf-8')
          init_text = re.sub(r'(?m)^__version__\s*=\s*"[^"]+"$', f'__version__ = "{new_version}"', init_text, count=1)
          init_path.write_text(init_text, encoding='utf-8')
          print(new_version)
          PY
          )

          TAG="kumiki-v${NEW_VERSION}"
          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag already exists: ${TAG}" >&2
            exit 1
          fi

          git add pyproject.toml kumiki/__init__.py
          git commit -m "Release kumiki v${NEW_VERSION}"
          git tag -a "${TAG}" -m "Release kumiki v${NEW_VERSION}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${TAG}"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Resolve package version
        if: github.event.inputs.existing_tag
        shell: bash
        run: |
          TAG=${{ github.event.inputs.existing_tag }}
          VERSION=${TAG#kumiki-v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        if: !github.event.inputs.existing_tag
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish To Index
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.target }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        run: |
          TAG=${{ github.event.inputs.existing_tag || needs.build.outputs.version }}
          # Existing publishing logic

  verify:
    name: Verify Published Package
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install from selected index
        run: |
          if [ "${{ github.event.inputs.target }}" = "testpypi" ]; then
            python -m pip install --upgrade pip
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "kumiki==${{ needs.build.outputs.version }}"
          else
            python -m pip install --upgrade pip
            python -m pip install "kumiki==${{ needs.build.outputs.version }}"
          fi

      - name: Verify import and version
        run: |
          python - <<'PY'
          import kumiki

          print('Installed kumiki version:', kumiki.__version__)
          PY
